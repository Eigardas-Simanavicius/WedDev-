<!DOCTYPE html>
<html lang = "en" xmlns:th="http://www.thymeleaf.org" >
<head>
    <title>Eigbooks</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{../css/cart.css}" rel="stylesheet" />
</head>
<body>
<header>
    <nav class="navbar" th:fragment="navbar">
        <ul class="nav-right">
            <li class ="split" > <a class="title" th:href="@{/}">Eigbooks</a> </li>
            <li> <a th:href="@{/Account}">Account</a></li>
            <li> <a th:href="@{/Cart}"> Cart</a></li>
            <li> <a th:href="@{/store}">Books</a> </li>
            <li> <a th:href="@{/}">Home</a> </li>
        </ul>
    </nav>
</header>
<div class="page">
<div class="page-header">
    <h1>Your Cart</h1>
    <p class="greeting">Welcome back, <span th:text="${user}" ></span></p>
</div>



<div class="cart-items">
    <div class="cart-card" th:each="book,iter: ${cart.productIds}">
            <img th:src ="@{../images/book.jpg}" alt="Book" class="book-thumb" >
        <div class="book-info">
            <div class="book-title" style="width: 20%"><span th:text="${book.getName()}"> </span></div>
            <div class ="price-unit">Price per Item: € <span th:text ="${book.getPrice()}"></span> </div>
            <p class="cartRemove"><a th:href="@{/RemovefromCart(input=${book.getId()})}" class="fakebutton">Remove from cart</a></p>
        </div>
        <div class="qty-block">
            <div class ="qty-price"  aria-label="Decrease">Total Price: € <span th:text ="${book.GetPricewithQuant( cart.getQuantities().get(iter.index))}"></span> </div>
            <div class="qty-btn"> <a th:href="@{/Increasequantitiy(input=${book.getId()})}" style="text-decoration: none;scale: 150%;color: black"> + </a></div>
            <span class="qty-num" id="qty" th:text ="${cart.getQuantities().get(iter.index)}"> 1 </span>
            <div class="qty-btn"> <a th:href="@{/Decreasequantitiy(input=${book.getId()})}" style="text-decoration: none;scale: 150%;color: black"> - </a></div>

        <div>
    </div>
</div>

    </div>
    <div class="summary-card">
        <div class="summary-title">Order Summary</div>
        <div class="summary-row"><span>Subtotal </span><span style="text-align: right;">€</span><span th:text ="${cart.getPrice()}"></span></div>
        <div class="summary-row"><span>Shipping</span><span style="text-align: right;">€</span><span>Free</span></div>
        <div class="summary-row total"><span>Total</span><span style="text-align: right;">€</span><span th:text="${cart.getPrice()}" style="font-size: 95%"> </span></div>
        <div class="cartRemove"><a th:href="@{/Checkout(input=${cart})}" class="fakebutton">CheckOut</a></div>
    </div>
</div>
</body>

</html>
