<!DOCTYPE html>
<html lang = "en" xmlns:th="http://www.thymeleaf.org" >
<head>
    <title>Eigbooks</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{../css/stylesheet.css}" rel="stylesheet" />
</head>
<body>
<header>

    <nav class="navbar" th:fragment="navbar">
        <ul class="nav-right">
            <li class ="split" > <a class="title" th:href="@{/}">Eigbooks</a> </li>
            <li> <a th:href="@{/Account}">Account</a></li>
            <li> <a th:href="@{/Cart}"> Cart</a></li>
            <li> <a th:href="@{/store}">Books</a> </li>
            <li> <a th:href="@{/}">Home</a> </li>
        </ul>
    </nav>
</header>
<h1 style="text-align: center"> Sign In </h1>
<div class="formbox">
    <form action="#" th:action="@{/SignInProcess}" th:object="${user}" method="post">
        <p>Name: <input type="text" th:field="*{name}" /></p>
        <p>PassWord: <input type="password" th:field="*{pass}" /></p>
        <p><input type="submit" value="Submit" /> </p>
    </form>
<button> <a th:href="@{/SignUp}" >Create Account </a> </button>
</div>
</body>
</html>
