
<!DOCTYPE html>
<html lang = "en" xmlns:th="http://www.thymeleaf.org" >
<head>
    <title>Eigbooks</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{../css/stylesheet.css}" rel="stylesheet" />
</head>
<body>
<header>


    <nav class="navbar" th:fragment="navbar">
        <ul class="nav-right">
            <li class ="split" > <a class="title" th:href="@{/}">Eigbooks</a> </li>
            <li> <a th:href="@{/Account}">Account</a></li>
            <li> <a th:href="@{/Cart}"> Cart</a></li>
            <li> <a th:href="@{/store}">Books</a> </li>
            <li> <a th:href="@{/}">Home</a> </li>
        </ul>
    </nav>
</header>
    <h1> Welcome to your account section </h1>
    <h1 th:text="${user}"> </h1>


<h3 style="text-align: center"> Add New Products </h3>
<div class="formbox">
<form action="#" th:action="@{/CreateNewProduct}" th:object="${NuclearWeaponsLaunchCodes}" method="post">
    <p>Name: <label>
        <input type="text" th:field="*{name}" />
    </label></p>
    <p>Price: <label>
        <input type="number" id="price"
               name="price" min="0"
               max="1000" step="0.01" th:field="*{price}" />
    </label></p>
    <p>Description: <label>
        <input type="text" th:field="*{description}" />
    </label></p>
    <p><input type="submit" value="Submit" style="scale: 150%s"/> </p>

</form>
</div>

</body>
</html>
