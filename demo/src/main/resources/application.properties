spring.application.name=marketplace
# H2 file-based database
spring.datasource.url=jdbc:h2:file:./data/mydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# H2 Console (optional but great for teaching)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-consol

#Set session timeout(e.g.,30 Minutes)
server.servlet.session.timeout=30m

#Enable Spring Session JDBC to create tables automatically
spring.session.jdbc.initialize-schema=always

#Optional: customize the name of the session table
spring.session.jdbc.table-name=SPRING_SESSION